# Conda environment for the thesis pipeline. One-shot setup:
#     conda env create -f environment.yml
#     conda activate thesis-uplift
#     jupyter lab thesis_pipeline.ipynb
# Versions are pinned to the environment the results were produced in, so a fresh
# install reproduces the reported numbers. If the conda solver cannot find an exact
# pin, relax that line to its minor version (e.g. numpy=2.3) or use requirements.txt.
name: thesis-uplift
channels:
  - conda-forge
dependencies:
  - python=3.13
  - pip
  - numpy=2.3.5
  - pandas=2.3.3
  - scipy=1.16.3
  - scikit-learn=1.7.2
  - matplotlib=3.10.6
  - networkx=3.5
  - jupyterlab=4.4.7
  - pip:
      - autodp==0.2.3.1
      # MST mechanism (private-pgm / mbi) and its JAX backend, pinned:
      - jax==0.10.0
      - jaxlib==0.10.0
      - chex==0.1.91
      - optax==0.2.8
      - attrs==25.4.0
      # the MST library bundled in this repo (installs the `mbi` package):
      - ./private-pgm
